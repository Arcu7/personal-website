<header class="site-header">
  <div class="container header-container">
    <div class="header-left">
      <a href="{{ "/" | relURL }}" class="logo-link">
        <span class="terminal-brand">>/home/rifaldo</span>
        <span class="terminal-cursor" aria-hidden="true"></span>
      </a>
    </div>
    <nav class="header-right" aria-label="Main navigation">
      <ul class="nav-menu">
        {{ range site.Menus.main }}
          <li>
            <a
              href="{{ .URL }}"
              {{ if .Params.external }}target="_blank" rel="noopener noreferrer"{{ end }}
              class="{{ if .Params.external }}resume-link{{ end }}{{ if $.IsMenuCurrent .Menu . }} active{{ else if $.HasMenuCurrent .Menu . }} ancestor{{ end }}"
            >
              {{ .Name }}
              {{ if .Params.external }}
                <svg class="icon-external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                  <polyline points="15 3 21 3 21 9"></polyline>
                  <line x1="10" y1="14" x2="21" y2="3"></line>
                </svg>
              {{ end }}
            </a>
          </li>
        {{ end }}
      </ul>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </nav>
  </div>
</header>
